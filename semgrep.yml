rules:
  - id: variable-in-sql-query
    patterns:
      - pattern-either:
          - pattern: $CONN->query($SQL)
          - pattern: mysqli_query($CONN, $SQL)
      - pattern-not: $CONN->query("...")
      - pattern-not: mysqli_query($CONN, "...")
    message: "Potential SQL injection. A variable is being passed into a database query instead of using a prepared statement."
    languages:
      - php
    severity: ERROR
